<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DiagramAI</title>
</head>

<body style="margin:0; font-family:Segoe UI; background:#0f172a; color:white; display:flex; height:100vh;">

  <!-- MAIN -->
  <div style="flex:1; display:flex; justify-content:center; align-items:center;">
    
    <div style="display:flex; gap:20px; width:90%; max-width:1100px;">

      <!-- INPUT -->
      <div style="flex:1; padding:20px; background:rgba(255,255,255,0.05); border-radius:15px;">
        <h2>DiagramAI</h2>

        <textarea id="inputText"
          placeholder="Enter physics question..."
          style="width:100%; height:100px; margin:10px 0; padding:10px; border-radius:8px; border:none;">
        </textarea>

        <button onclick="generate()" style="width:100%; padding:10px;">Generate Diagram</button>
      </div>

      <!-- CANVAS -->
      <div style="flex:1; background:white; border-radius:15px; padding:10px;">
        <canvas id="canvas" width="600" height="400"></canvas>
      </div>

    </div>

  </div>

  <!-- SIDEBAR -->
  <div style="width:320px; background:#020617; border-left:1px solid #1e293b; display:flex; flex-direction:column;">
    
    <div style="padding:15px; border-bottom:1px solid #1e293b;">
      <b>Physics Assistant</b>
    </div>

    <div id="chatBox" style="flex:1; padding:10px; overflow-y:auto; font-size:14px;"></div>

    <div style="padding:10px;">
      <input id="chatInput" placeholder="Ask approach / formula..."
        style="width:100%; padding:8px; border-radius:6px; border:none;">
      <button onclick="sendMessage()" style="width:100%; margin-top:5px;">Send</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
